<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>YouTube Focus Mode</title>
<style>
  :root {
    --on-color: #1a7f37;
    --off-color: #6b7280;
  }
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    width: 240px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #ffffff;
    color: #1f2430;
  }
  .container {
    padding: 16px;
    text-align: center;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: 0.2px;
  }
  #toggleBtn {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: #ffffff;
    transition: background-color 0.15s ease;
  }
  #toggleBtn.on {
    background-color: var(--on-color);
  }
  #toggleBtn.off {
    background-color: var(--off-color);
  }
  #toggleBtn:active {
    opacity: 0.85;
  }
  #status {
    margin-top: 10px;
    font-size: 12px;
    color: #6b7280;
  }
  .stats-section {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #e5e7eb;
    text-align: left;
  }
  .stats-header {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: 0.2px;
  }
  .stats-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12px;
    color: #6b7280;
  }
  .stats-row .stats-value {
    font-size: 13px;
    font-weight: 600;
    color: #1f2430;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>YouTube Focus Mode</h1>
    <button id="toggleBtn" type="button">Loading...</button>
    <div id="status"></div>

    <div class="stats-section">
      <h2 class="stats-header">📊 Watch Statistics</h2>
      <div class="stats-row">
        <span>Today</span>
        <span class="stats-value" id="todayTime">0m</span>
      </div>
      <div class="stats-row">
        <span>This Week</span>
        <span class="stats-value" id="weekTime">0m</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
